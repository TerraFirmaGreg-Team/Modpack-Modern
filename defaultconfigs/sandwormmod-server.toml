
[sandworm]
	#Value at which sandworm will spawn. Higher values mean the worm will take longer to spawn. Default 4000.
	#Range: 1000 ~ 100000
	max_wormsign = 4000
	#Seconds after leaving a worm's range until another one can spawn. Default 120.
	#Range: 10 ~ 216000
	respawn_duration = 120
	#Time til despawn in seconds when not targeting a survival player. Default 3 minutes.
	#Range: 30 ~ 216000
	despawn_duration = 180
	#Number of explosions the worm's head can handle before dropping a tooth and running away. Default 3
	#Range: 1 ~ 100
	health = 3
	#Value the damage dealt by the worm is scaled by. Default 1.0.
	#Range: 0.01 ~ 100.0
	damage_multiplier = 1.0
	#Multiplier for damage dealt by the head of the worm compared to a body segment. Default 2.0 (head deals double damage).
	#Range: 0.01 ~ 100.0
	head_multiplier = 2.0
	#By default, the sandworm can spawn in any biome golden rabbits spawn in. This option enables or disables that.
	#To add additional biomes the sandworm can spawn in, create a datapack that edits the sandworm_mod:can_spawn_sandworms biome tag.
	#Specifically, create can_spawn_sandworms.json in data->sandworm_mod->tags->worldgen->biome.
	#Bellow is an example json file that allows sandworms to spawn in jungles:
	#{
	#  "values": [
	#    "minecraft:jungle"
	#  ]
	#}
	default_spawning = false

[trigger]
	#Wormsign increment per tick when player sprinting. Default 4.
	#Range: 1 ~ 100
	player_trigger_multiplier = 4
	#Wormsign increment per tick when riding vehicles. Default 4.
	#Range: 1 ~ 100
	vehicle_trigger_multiplier = 4
	#Vehicle trigger mode: ALL, NONE, WHITELIST, BLACKLIST, BOTH.
	#- ALL: all vehicles trigger.
	#- NONE: no vehicles trigger.
	#- WHITELIST: only vehicles in the whitelist trigger (blacklist ignored).
	#- BLACKLIST: all vehicles except those in the blacklist trigger (whitelist ignored).
	#- BOTH: vehicle must be in whitelist AND not in blacklist to trigger.
	#Allowed Values: ALL, NONE, WHITELIST, BLACKLIST, BOTH
	vehicle_trigger_mode = "BOTH"
	#List of vehicles that will NOT trigger sandworms. Format: ["modid:*", "modid:entity_name", "*horse", "*car*"]. Default: empty.
	vehicle_blacklist = ["wan_ancient_beasts:soarer", "wan_ancient_beasts:surfer", "tfg:surfer"]
	#List of vehicles that WILL trigger sandworms. Format: ["modid:*", "modid:entity_name", "*horse", "*car*"]. Default: empty.
	vehicle_whitelist = ["ad_astra:tier_1_rover"]
	#Enable warning messages when sandworm is approaching (messages to nearby players)
	enable_warning_messages = false

