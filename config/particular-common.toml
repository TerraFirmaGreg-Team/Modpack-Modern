
#Particular Mod Configuration
[general]

	#Enable/Disable Effects
	[general.enabledEffects]
		#Enable water splash particles
		waterSplash = true
		#Enable cascade particles
		cascades = true
		#Enable waterfall spray particles
		waterfallSpray = true
		#Enable firefly particles
		fireflies = true
		#Enable falling leaves particles
		fallingLeaves = false
		#Enable cave dust particles
		caveDust = true
		#Enable chest bubbles
		chestBubbles = false
		#Enable soul sand bubbles
		soulSandBubbles = false
		#Enable barrel bubbles
		barrelBubbles = false
		#Enable popping bubbles
		poppingBubbles = false
		#Enable rain ripples
		rainRipples = true
		#Enable water drip ripples
		waterDripRipples = true
		#Enable cake eating particles
		cakeEatingParticles = true
		#Enable emissive lava drips
		emissiveLavaDrips = true
		#Enable lava splash particles when entities hit lava
		lavaSplash = true

	#Advanced Particle Settings
	[general.advancedSettings]

		[general.advancedSettings.fireflySettings]
			#Time when fireflies start spawning
			#Range: 0 ~ 23999
			startTime = 12000
			#Time when fireflies stop spawning
			#Range: 0 ~ 23999
			endTime = 23000
			#Minimum temperature for fireflies to spawn
			#Range: 0.0 ~ 2.0
			minTemp = 0.0
			#Maximum temperature for fireflies to spawn
			#Range: 0.0 ~ 2.0
			maxTemp = 2.0
			#Whether fireflies can spawn in rain
			canSpawnInRain = true
			#Biomes where fireflies always spawn (bypasses temperature check). Example: "minecraft:swamp"
			biomes = ["tfc:lowlands", "tfc:salt_marsh", "tfg:earth/lowlands", "tfg:earth/salt_marsh"]
			#Extra blocks that spawn fireflies. Example: "tfc:plant/cattail"
			spawnBlocks = ["tfc:plant/arrowhead", "tfc:plant/bur_reed", "tfc:plant/cattail", "tfc:plant/marigold", "tfc:plant/phragmite", "tfc:plant/pickerelweed", "tfc:plant/water_taro", "tfc:plant/water_lily", "tfc:plant/water_canna", "tfc:plant/lotus"]
			#Per-biome firefly RGB hex tints. Format: "biomeId|RRGGBB". Example: "minecraft:swamp|FFD27F". Takes priority over fireflyColorPool.
			biomeColors = []
			#Random RGB hex colors picked per firefly when no biomeColors entry matches. Empty = use built-in yellow/blue/red mix. Format: "RRGGBB".
			colorPool = []

			[general.advancedSettings.fireflySettings.frequencyModifiers]
				#Daily random factors for firefly spawning
				dailyRandom = [0.0, 0.0, 0.0, 0.33, 0.66, 1.0]
				#Frequency modifier for grass
				#Range: 0.0 ~ 1.0
				grass = 0.16666666666666666
				#Frequency modifier for tall grass
				#Range: 0.0 ~ 1.0
				tallGrass = 0.08333333333333333
				#Frequency modifier for flowers
				#Range: 0.0 ~ 1.0
				flowers = 1.0
				#Frequency modifier for tall flowers
				#Range: 0.0 ~ 1.0
				tallFlowers = 0.5
				#Frequency modifier for blocks listed in fireflySpawnBlocks
				#Range: 0.0 ~ 1.0
				customBlocks = 0.16666666666666666

		[general.advancedSettings.fallingLeavesSettings]
			#Chance of spawning falling leaves (higher = less frequent)
			#Range: > 1
			spawnChance = 60
			#Whether falling leaves create ripples when landing on water
			spawnRipples = true
			#Whether falling leaves lay flat on the ground
			layFlatOnGround = true
			#Whether falling leaves lay at right angles
			layFlatRightAngles = false

		[general.advancedSettings.caveDustSettings]
			#Chance of spawning cave dust (higher = less frequent)
			#Range: > 1
			spawnChance = 700
			#Base maximum age of cave dust particles
			#Range: > 1
			baseMaxAge = 200
			#OwOColor of cave dust particles (RGB hex)
			#Range: 0 ~ 16777215
			color = 8421504
			#Duration of fade effect for cave dust particles
			#Range: > 0
			fadeDuration = 20
			#Maximum acceleration of cave dust particles
			#Range: 0.0 ~ 1.0
			maxAcceleration = 0.029999999329447746
			#Chance of changing acceleration for cave dust particles
			#Range: > 1
			accelChangeChance = 180
			#Biomes where cave dust won't spawn
			excludeBiomes = ["minecraft:lush_caves", "minecraft:dripstone_caves", "minecraft:deep_dark"]

		[general.advancedSettings.waterSplashSettings]
			#Minimum fall distance (in blocks) required to trigger water splash particles
			#Range: 0.0 ~ 100.0
			minFallDistance = 0.0
			#Whether small splashes should emit water droplet particles
			smallDroplets = false
			#Opacity of water and lava splash particles
			#Range: 0.0 ~ 1.0
			splashOpacity = 0.75
			#Whether soft water entries should emit bubbles and tiny falling-water droplets instead of a full splash
			softEntryParticles = true
			#Use 1-voxel cuboid particles for waterfall spray
			cuboidWaterfallSpray = false
			#Use 1-voxel cuboid particles for splash droplets
			cuboidSplashDroplets = true
			#Tint cuboid waterfall spray using the local biome water color
			waterCuboidBiomeTint = true
			#Fallback color of cuboid waterfall spray when biome tinting is disabled (RGB hex)
			#Range: 0 ~ 16777215
			waterCuboidColor = 16777215
			#Color of cuboid lava droplets (RGB hex)
			#Range: 0 ~ 16777215
			lavaCuboidColor = 16738335

		[general.advancedSettings.customFluidsSettings]
			#Fluid IDs treated like vanilla water for splash, rain ripples, and waterfall spray. Example: "tfc:river_water"
			waterLikeFluids = ["tfc:river_water", "tfc:flowing_salt_water", "tfc:salt_water", "tfc:flowing_spring_water", "tfc:spring_water", "tfg:semiheavy_ammoniacal_water", "tfg:muddy_water", "tfg:geyser_slurry"]
			#Flowing,source fluid pairs that produce cascade waterfalls. Example: "mymod:flowing_water,mymod:water". TFC fluids do not produce cascades because they have no flowing variant.
			cascadeFluidPairs = ["minecraft:flowing_water,tfc:river_water", "tfc:flowing_salt_water,tfc:salt_water", "tfc:flowing_spring_water,tfc:spring_water", "tfg:flowing_muddy_water,tfg:muddy_water", "tfg:flowing_semiheavy_ammoniacal_water,tfg:semiheavy_ammoniacal_water", "tfg:flowing_geyser_slurry,tfg:geyser_slurry"]

