name: "Crowdin Translations"
run-name: "[🌐]: Crowdin Translations #${{ github.run_number }}"

on:
  push:
    branches: [dev]
    paths:
      - 'kubejs/assets/**/lang/en_us.json'
      - 'kubejs/assets/**/patchouli_books/**/en_us/**/*.json'
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Create Pull Request after sync"
        type: boolean
        default: false
        required: true
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCALIZATION_BRANCH: translations
  TARGET_BRANCH: dev

jobs:
  sync-patchouli:
    name: "[🔄] Sync Patchouli"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Crowdin"
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          download_translations: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          # export_only_approved: true
          # skip_untranslated_files: true
          create_pull_request: false
          localization_branch_name: ${{ env.LOCALIZATION_BRANCH }}
          pull_request_base_branch_name: ${{ env.TARGET_BRANCH }}
          commit_message: "[translation] New translations"
          config: .github/config/crowdin_patchouli.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_ID: ${{ vars.CROWDIN_ID }}

  sync-language:
    name: "[🔄] Sync Language"
    runs-on: ubuntu-latest
    needs: [sync-patchouli]
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Crowdin"
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          download_translations: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          skip_untranslated_strings: true
          # export_only_approved: true
          create_pull_request: false
          localization_branch_name: ${{ env.LOCALIZATION_BRANCH }}
          pull_request_base_branch_name: ${{ env.TARGET_BRANCH }}
          commit_message: "[translation] New translations"
          config: .github/config/crowdin_lang.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_ID: ${{ vars.CROWDIN_ID }}

  cleanup-empty-files:
    name: "[🗑️] Cleanup Empty Files"
    runs-on: ubuntu-latest
    needs: [sync-patchouli, sync-language]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      changed: ${{ steps.remove_empty.outputs.changed }}
    steps:
      - name: "Check if translations branch exists"
        id: check_branch
        run: |
          if git ls-remote --exit-code --heads origin ${{ env.LOCALIZATION_BRANCH }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Branch '${{ env.LOCALIZATION_BRANCH }}' does not exist, skipping cleanup"
          fi

      - name: "Checkout translations branch"
        if: steps.check_branch.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ env.LOCALIZATION_BRANCH }}
          fetch-depth: 0

      - name: "Remove empty translation files"
        id: remove_empty
        if: steps.check_branch.outputs.exists == 'true'
        run: |
          echo "🔍 Searching for empty JSON files..."
          CHANGED=false
          COUNT=0
          while IFS= read -r -d '' file; do
            if [ "$(jq -r 'keys | length' "$file" 2>/dev/null)" -eq 0 ]; then
              echo "  🗑️  Removing: $file"
              rm "$file"
              CHANGED=true
              ((COUNT++))
            fi
          done < <(find kubejs/assets -name "*.json" -type f -print0)
          echo "📊 Checked files, found $COUNT empty"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: "Commit removed files"
        if: steps.remove_empty.outputs.changed == 'true'
        uses: devops-infra/action-commit-push@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "Remove empty translation files"
          target_branch: ${{ env.LOCALIZATION_BRANCH }}

  create-pr:
    name: "[🤝] Create Pull Request"
    runs-on: ubuntu-latest
    needs: [cleanup-empty-files]
    if: (github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && inputs.create_pr)
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Create Pull Request"
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: ${{ env.LOCALIZATION_BRANCH }}
          target_branch: ${{ env.TARGET_BRANCH }}
          ignore_users: "dependabot"
          label: "Pull request: Translation"
          title: 'add: New Crowdin translations'
          body: |
            ## 🌐 New translations from Crowdin

            ### 🔄 Changes
            - Updated translation files
            - Patchouli book translations

            ### 🧪 Testing
            Test in-game with different languages.