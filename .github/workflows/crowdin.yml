name: "Crowdin Translations"
run-name: "[🌐]: Crowdin Translations #${{ github.run_number }}"

on:
  push:
    branches: [dev]
    paths:
      - 'kubejs/assets/**/lang/en_us.json'
      - 'kubejs/assets/**/patchouli_books/**/en_us/**/*.json'
  workflow_dispatch:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  LOCALIZATION_BRANCH: translations
  TARGET_BRANCH: dev

jobs:
  sync:
    name: "[🔄] Sync Translations"
    runs-on: ubuntu-latest
    steps:
      - name: "[📦] Checkout repository"
        uses: actions/checkout@v6

      - name: "[✅] Validate source files"
        run: |
          echo "Validating source language files..."
          find kubejs/assets -name "en_us.json" -type f | while read file; do
            echo " Found source file: $file"
            if ! jq empty "$file" 2>/dev/null; then
              echo " Invalid JSON in $file"
              exit 1
            fi
          done
          echo "All source files are valid JSON"

      - name: "[📚] Crowdin (Patchouli)"
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          download_translations: true
          export_only_approved: true
          skip_untranslated_files: true
          create_pull_request: false
          localization_branch_name: ${{ env.LOCALIZATION_BRANCH }}
          pull_request_base_branch_name: ${{ env.TARGET_BRANCH }}
          config: .github/config/crowdin_patchouli.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_ID: ${{ vars.CROWDIN_ID }}

      - name: "[🌐] Crowdin (Language)"
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          download_translations: true
          skip_untranslated_strings: true
          export_only_approved: true
          create_pull_request: false
          localization_branch_name: ${{ env.LOCALIZATION_BRANCH }}
          pull_request_base_branch_name: ${{ env.TARGET_BRANCH }}
          config: .github/config/crowdin_lang.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_TOKEN }}
          CROWDIN_ID: ${{ vars.CROWDIN_ID }}

      - name: "[🗑️] Remove empty translation files"
        id: remove_empty
        run: |
          echo "Removing empty translation files..."
          CHANGED=false
          for file in $(find kubejs/assets -name "*.json" -type f); do
            if [ "$(jq -r 'keys | length' "$file" 2>/dev/null)" -eq 0 ]; then
              echo "Removing empty file: $file"
              rm "$file"
              CHANGED=true
            fi
          done
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: "[💾] Commit removed files"
        if: steps.remove_empty.outputs.changed == 'true'
        uses: devops-infra/action-commit-push@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "Remove empty translation files"
          target_branch: ${{ env.LOCALIZATION_BRANCH }}


  # Create Pull Request after all syncs are done
  create-pr:
    name: "[🤝] Create Pull Request"
    runs-on: ubuntu-latest
    needs: [sync]
    steps:
      - name: "[📦] Checkout repository"
        uses: actions/checkout@v6

      - name: "[📬] Create Pull Request"
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: ${{ env.LOCALIZATION_BRANCH }}
          target_branch: ${{ env.TARGET_BRANCH }}
          ignore_users: "dependabot"
          label: "Pull request: Translation"
          title: 'add: New Crowdin translations'
          body: |
            ## 🌐 New translations from Crowdin

            ### 🔄 Changes
            - Updated translation files
            - Patchouli book translations

            ### 🧪 Testing
            Test in-game with different languages.